[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "morph"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[package]
name = "morph"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

[dependencies]
morph = { path = "." }
# Exclude broken Mojo nightlies that crash at process start on Linux
# (`libKGENCompilerRTShared+0x6de3b`/`+0x6dc0b` -> libc sigaction) for
# morph's serde tests.  Upper bound excludes the first affected nightly;
# downstream consumers (envo, sqlite, ...) stay free to move forward as
# soon as a fixed nightly lands.
mojo = "<0.26.3.0.dev2026042005"

[target.linux-64.dependencies]
# Pin sysroot to 2.34 -- newer sysroots (2.39+) have been observed to crash
# Mojo's JIT runtime (`libKGENCompilerRTShared` abort during process init)
# on GitHub's ubuntu-latest runners.
sysroot_linux-64 = "2.34.*"

[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
# Format
install-pre-commit = "pre-commit install"
format = { cmd = "mojo format morph tests examples", depends-on = ["install-pre-commit"] }

# Tests (includes examples)
tests = "mojo -I . tests/test_reflect.mojo && mojo -I . tests/test_rename.mojo && mojo -I . tests/test_serialize.mojo && mojo -I . tests/test_deserialize.mojo && mojo -I . tests/test_roundtrip.mojo && mojo -I . tests/test_edge_cases.mojo && mojo -I . tests/test_transform.mojo && mojo -I . tests/test_validate.mojo && mojo -I . tests/test_processors.mojo && mojo -I . tests/test_cli_csv.mojo && mojo -I . tests/test_new_features.mojo && mojo -I . tests/test_toml_yaml.mojo && mojo -I . examples/01_basic_serde.mojo && mojo -I . examples/02_nested_structs.mojo && mojo -I . examples/03_optional_and_list.mojo && mojo -I . examples/04_custom_traits.mojo && mojo -I . examples/05_rename.mojo && mojo -I . examples/06_transform.mojo && mojo -I . examples/07_validate.mojo && mojo -I . examples/08_cli.mojo && mojo -I . examples/09_csv.mojo && mojo -I . examples/10_toml.mojo && mojo -I . examples/11_yaml.mojo"
test-reflect = "mojo -I . tests/test_reflect.mojo"
test-rename = "mojo -I . tests/test_rename.mojo"
test-serialize = "mojo -I . tests/test_serialize.mojo"
test-deserialize = "mojo -I . tests/test_deserialize.mojo"
test-roundtrip = "mojo -I . tests/test_roundtrip.mojo"
test-edge-cases = "mojo -I . tests/test_edge_cases.mojo"
test-transform = "mojo -I . tests/test_transform.mojo"
test-validate = "mojo -I . tests/test_validate.mojo"
test-processors = "mojo -I . tests/test_processors.mojo"
test-cli-csv = "mojo -I . tests/test_cli_csv.mojo"
test-new-features = "mojo -I . tests/test_new_features.mojo"
test-toml-yaml = "mojo -I . tests/test_toml_yaml.mojo"

# Examples
example-basic = "mojo -I . examples/01_basic_serde.mojo"
example-nested = "mojo -I . examples/02_nested_structs.mojo"
example-optional = "mojo -I . examples/03_optional_and_list.mojo"
example-custom = "mojo -I . examples/04_custom_traits.mojo"
example-rename = "mojo -I . examples/05_rename.mojo"
example-transform = "mojo -I . examples/06_transform.mojo"
example-validate = "mojo -I . examples/07_validate.mojo"
example-cli = "mojo -I . examples/08_cli.mojo"
example-csv = "mojo -I . examples/09_csv.mojo"
example-toml = "mojo -I . examples/10_toml.mojo"
example-yaml = "mojo -I . examples/11_yaml.mojo"
examples = "mojo -I . examples/01_basic_serde.mojo && mojo -I . examples/02_nested_structs.mojo && mojo -I . examples/03_optional_and_list.mojo && mojo -I . examples/04_custom_traits.mojo && mojo -I . examples/05_rename.mojo && mojo -I . examples/06_transform.mojo && mojo -I . examples/07_validate.mojo && mojo -I . examples/08_cli.mojo && mojo -I . examples/09_csv.mojo && mojo -I . examples/10_toml.mojo && mojo -I . examples/11_yaml.mojo"

# Docs
docs = "mojodoc ./morph --open"
docs-build = "mojodoc ./morph --out-dir target/doc --base-url /morph/"
